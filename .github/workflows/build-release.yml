name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger when pushing tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard

    - name: Cache Nuitka downloads
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\Nuitka
        key: nuitka-cache-windows-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          nuitka-cache-windows-
    
    - name: Build executable with Nuitka
      run: |
        .\compile.bat
      shell: cmd
      
    - name: Verify build output
      run: |
        if (-Not (Test-Path "build/LpkUnpackerGUI.dist/LpkUnpackerGUI.exe")) {
          Write-Error "Build failed: build/LpkUnpackerGUI.dist/LpkUnpackerGUI.exe not found"
          exit 1
        }
        Write-Host "Build successful!"
    
    - name: Package build output
      id: package
      run: |
        if ("${{ github.ref }}" -match '^refs/tags/(.+)$') {
          $version = $matches[1]
        } else {
          $version = "${{ github.sha }}".Substring(0, 7)
        }
        $zipName = "LpkUnpacker-$version-windows-x64.zip"
        Compress-Archive -Path "build/LpkUnpackerGUI.dist/*" -DestinationPath $zipName -CompressionLevel Optimal
        echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64-binary
        path: ${{ steps.package.outputs.ZIP_NAME }}

  release:
    name: Create Release
    needs: [build_windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-x64-binary

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          LpkUnpacker-*-windows-x64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build/
          *.log
        retention-days: 7

